<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>YTMusic Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #111;
      color: #fff;
      padding: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 16px 16px 14px;
      background: linear-gradient(135deg, #1a0a0e 0%, #1a1014 100%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .logo-wrap {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #ff0030, #ff6010);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .name { font-size: 14px; font-weight: 700; line-height: 1.2; }
    .sub  { font-size: 11px; color: #777; margin-top: 1px; }

    /* ── Status pill ── */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 14px 0;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.active   { background: #00e676; box-shadow: 0 0 6px #00e676; animation: pulse 2s infinite; }
    .dot.inactive { background: #ff4444; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .status-text { font-size: 12px; color: #ccc; }

    /* ── Tip ── */
    .tip {
      font-size: 11px;
      color: #555;
      line-height: 1.55;
      text-align: center;
      padding: 12px 16px;
    }
    .tip a { color: #ff4060; text-decoration: none; }

    /* ── Credit ── */
    .credit {
      font-size: 10.5px;
      color: #3a3a3a;
      text-align: center;
      padding: 0 16px 14px;
      font-weight: 500;
    }
    .credit span { color: #ff4060; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-wrap">🎵</div>
    <div>
      <div class="name">YTMusic Widget</div>
      <div class="sub">Floating Player</div>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Verificando conexión…</span>
  </div>

  <div class="tip" id="tip">
    Abre <a href="https://music.youtube.com" target="_blank">music.youtube.com</a>
    y asegúrate de que la app nativa esté corriendo.
  </div>

  <div class="credit">Desarrollado por: <span>@ariel.cavadia1</span></div>

  <script>
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const tip        = document.getElementById('tip');

    // 1. Verificar app Swift (via background)
    chrome.runtime.sendMessage({ type: 'ping' }, (res) => {
      if (chrome.runtime.lastError || !res) {
        setStatus(false, 'Background no disponible');
        return;
      }
      if (res.ok) {
        setStatus(true, 'Widget activo ✓');
        tip.textContent = 'Reproduce una canción en YouTube Music para que aparezca el widget.';
      } else {
        setStatus(false, 'App nativa no detectada — ejecuta run.sh');
      }
    });

    // 2. Solicitar estado actual al background
    chrome.runtime.sendMessage({ type: 'get_state' }, (res) => {
      if (chrome.runtime.lastError || !res?.state) return;
      const s = res.state;
      if (s.title) {
        tip.innerHTML = `▶ <strong>${s.title}</strong><br><span style="color:#777">${s.artist}</span>`;
      }
    });

    function setStatus(ok, text) {
      dot.className = 'dot ' + (ok ? 'active' : 'inactive');
      statusText.textContent = text;
    }
  </script>
</body>
</html>
